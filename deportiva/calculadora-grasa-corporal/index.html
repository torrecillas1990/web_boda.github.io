<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Calculadora Corporal</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="../recursos/favicon.ico">
	
	<meta name="theme-color" content="#1e3a8a">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-title" content="VitalStats">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<!-- Icono principal para iPhone Retina (180x180) -->
	<link rel="apple-touch-icon" href="../recursos/apple-icon-180x180.png">

	<!-- Opcional: Iconos específicos para diferentes tamaños -->
	<link rel="apple-touch-icon" sizes="152x152" href="../recursos/apple-icon-152x152.png"> <!-- iPad -->
	<link rel="apple-touch-icon" sizes="167x167" href="../recursos/apple-icon-167x167.png"> <!-- iPad Pro -->

	<link rel="manifest" href="/manifest.json">
</head>
<body>
	<nav class="navbar" id="navbar-js"></nav>
	
    <div class="container">
		<h1>Análisis Corporal Completo</h1>
		
		<div class="main-layout">
			<form id="fat-form">
				<div class="grid-inputs">
					<div class="input-group">
						<label>Género</label>
						<select id="gender">
							<option value="male">Hombre</option>
							<option value="female">Mujer</option>
						</select>
					</div>
					<div class="input-group">
						<label>Edad</label>
						<input type="number" id="age" placeholder="Años" required>
					</div>
					<div class="input-group">
						<label>Peso (kg)</label>
						<input type="number" id="weight" placeholder="Ej: 75" step="0.1" required>
					</div>
					<div class="input-group">
						<label>Altura (cm)</label>
						<input type="number" id="height" placeholder="Ej: 175" required>
					</div>
					<div class="input-group">
						<label>Cuello (cm)</label>
						<input type="number" id="neck" placeholder="Ej: 38" required>
					</div>
					<div class="input-group">
						<label>Cintura (cm)</label>
						<input type="number" id="waist" placeholder="Ej: 85" required>
					</div>
					<div id="hip-container" class="input-group hidden">
						<label>Cadera (cm)</label>
						<input type="number" id="hip" placeholder="Ej: 95">
					</div>
					<div class="input-group full-width">
						<label>Nivel de Actividad</label>
						<select id="activity">
							<option value="1.2">Sedentario (poco ejercicio)</option>
							<option value="1.375">Ligero (1-3 días/sem)</option>
							<option value="1.55">Moderado (3-5 días/sem)</option>
							<option value="1.725">Fuerte (6-7 días/sem)</option>
						</select>
					</div>
				</div>
            
				<div class="button-group">
					<button type="button" id="calcBtn" class="button-calc">Calcular Composición</button>
					<button type="button" id="clearBtn" class="btn-clear">Borrar Datos</button>
				</div>
			</form>
        
			<div id="result-container" class="hidden">
				<div class="result-card">
					<h3>Composición Corporal</h3>
					<div class="stats-grid">
						<div><small>Grasa Corporal</small><p id="res-fat">0%</p></div>
						<div><small>Masa Magra</small><p id="res-lean">0 kg</p></div>
						<div><small>Grasa Total</small><p id="res-fat-kg">0 kg</p></div>
						<div><small>IMC</small><p id="res-imc">0</p></div>
					</div>
					<button type="button" id="downloadImportBtn" class="btn-importar">💾 Guardar registro</button>
				</div>

				<div class="result-card calories">
					<h3>Calorías Diarias (Objetivos)</h3>
					<div class="stats-grid">
						<div class="target-def"><small>Definición (-500)</small><p id="cal-lose">0</p></div>
						<div class="target-maint"><small>Mantenimiento</small><p id="cal-maint">0</p></div>
						<div class="target-gain"><small>Volumen (+500)</small><p id="cal-gain">0</p></div>
					</div>
				</div>
			</div>
		</div>
		
		<!-- Sección de Evolución (Sustituye o amplía la actual) -->
		<section class="result-card">
			<h3>📈 Evolución de Composición</h3>
			<div class="chart-controls" style="margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
				<div id="chartToggles" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;">
					<label><input type="checkbox" class="chart-toggle" value="0" checked> Peso</label>
					<label><input type="checkbox" class="chart-toggle" value="1" checked> % Grasa</label>
					<label><input type="checkbox" class="chart-toggle" value="2"> Cintura</label>
					<label><input type="checkbox" class="chart-toggle" value="3"> Cuello</label>
					<label><input type="checkbox" class="chart-toggle" value="4"> Cadera</label>
					<label><input type="checkbox" class="chart-toggle" value="5"> Altura</label>
				</div>
				<select id="timeRangeFilter" class="filter-select" style="width: auto;">
					<option value="last7">Últimos 7 días</option>
					<option value="lastMonth">Último Mes</option>
					<option value="last6Months">6 Meses</option>
					<option value="lastYear">Un año</option>
				</select>
			</div>
			<div style="height: 300px;">
				<canvas id="fitnessChart"></canvas>
			</div>
		</section>

		<!-- Sección de Sincronización -->
		<section class="result-card bulk-section">
			<h3>📅 Sincronización Historial Servidor</h3>
			<div class="flex-row">
				<input type="date" id="importRangeStart">
				<input type="date" id="importRangeEnd">
				<button id="bulkImportBtn">🔄 Sincronizar</button>
			</div>
			<p id="currentRangeDisplay"></p>
		</section>
    </div>
	
	<div id="authModal" class="modal"></div>
	<div id="perfilModal" class="modal"></div>
	<nav class="mobile-tab-bar" id="mobile-tab-bar-js"></nav>
	<div id="install-banner" class="install-banner" style="display: none;"></div>
</body>
<script src="../navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../recursos/usuarios.js"></script>
<script src="../script.js"></script>
<script src="script.js"></script>
</html>
