<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Nutricional Mercadona</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="../recursos/favicon.ico">
</head>
<body>
	<nav class="navbar">
		<div class="nav-container">
			<a href="../index.html" class="logo">VitalStats</a>
			
			<button class="menu-toggle" id="mobile-menu">
				<span class="bar"></span>
				<span class="bar"></span>
				<span class="bar"></span>
			</button>

			<ul class="nav-links">
				<li><a href="../index.html">Inicio</a></li>
				<li><a href="../contador-calorias/index.html">Calorías</a></li>
				<li><a href="../calculadora-grasa-corporal/index.html">Grasa Corporal</a></li>
				<li><a href="../calculadora-ritmo/index.html">Ritmo Runner</a></li>
				<li><a href="../registro-premium/index.html" class="btn-nav">Premium</a></li>
			</ul>
		</div>
	</nav>

	<div class="container">
		<h1>🛒 Contador de Calorías Pro</h1>

		<div class="main-layout">
			<div class="left-column">
				<h2>Productos Disponibles</h2>
				<div class="search-box">
					<input type="text" id="productSearch" placeholder="Filtrar catálogo...">
				</div>
				
				<div id="quantityModal" style="display: none;">
					<p id="modalProductName"></p>
					<div class="modal-controls">
						<input type="number" id="quantityInput" value="100">
						<button id="confirmBtn">Añadir</button>
						<button id="cancelBtn">✕</button>
					</div>
				</div>

				<ul id="fullProductList" class="catalog-list"></ul>
			</div>
			
			<div class="right-column">
				<div class="diary">
					<div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 10px;">
						<h2>Diario</h2>
						<input type="date" id="datePicker" style="padding: 5px; border-radius: 5px; border: 1px solid #ccc;">
					</div>
					<ul id="diaryList"></ul>
					<div class="total">
						<strong>Total: <span id="totalCalories">0</span> kcal</strong>
					</div>
					<button id="clearBtn">Vaciar Lista</button>
					<button id="downloadBtn" style="background-color: #3498db; margin-top: 10px;">Guardar día</button>
				</div>

				<div class="pro-tip" style="margin-top: 20px; padding: 15px; border: 1px dashed #28a745; border-radius: 10px; font-size: 0.85em;">
					<strong>💡 Tip Pro:</strong> ¿Te cuesta llegar a tus proteínas? 
					<a href="TU_LINK_AFILIADO_PROTEINA" target="_blank" style="color: #28a745; text-decoration: underline;">
						Ver proteína recomendada de calidad.
					</a>
				</div>

				<div class="chart-container">
					<canvas id="macroChart"></canvas>
				</div>
			</div>
		</div>
	</div>
	
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="datos.js"></script> 
    <script src="../script.js"></script>
	<script src="script.js"></script>
</body>
</html>
