<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pokémon - Sistema de Bloques Pro (01-99)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="./recursos/favicon.ico">
	
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-title" content="VitalStats">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<!-- Icono principal para iPhone Retina (180x180) -->
	<link rel="apple-touch-icon" href="./recursos/apple-icon-180x180.png">

	<!-- Opcional: Iconos específicos para diferentes tamaños -->
	<link rel="apple-touch-icon" sizes="152x152" href="./recursos/apple-icon-152x152.png"> <!-- iPad -->
	<link rel="apple-touch-icon" sizes="167x167" href="./recursos/apple-icon-167x167.png"> <!-- iPad Pro -->
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="512" height="448"></canvas>
        
        <!-- UI de Combate -->
        <div id="battleUI">
            <div class="battle-grid">
                <div id="battleText">¡Un Pokémon salvaje apareció!</div>
                
                <!-- Menú Principal de Batalla -->
                <div id="menuOpciones">
                    <button onclick="abrirAtaques()">LUCHAR</button>
                    <button onclick="usarObjeto()">MOCHILA</button>
                    <button onclick="cambiarPokemon()">POKÉMON</button>
                    <button onclick="intentarHuir()">HUIR</button>
                </div>
                
                <!-- Menú de Ataques -->
                <div id="menuAtaques">
                    <button id="btnAtk0" onclick="ejecutarAtaque(0)">-</button>
                    <button id="btnAtk1" onclick="ejecutarAtaque(1)">-</button>
                    <button id="btnAtk2" onclick="ejecutarAtaque(2)">-</button>
                    <button id="volverMenu" onclick="cerrarAtaques()" style="font-size:11px;">VOLVER</button>
                </div>
            </div>
        </div>
    </div>

    <div id="instrucciones">
        <b>FÍSICAS AVANZADAS (01-99):</b> 🧊 Hielo (80) | ➡️ Cinta (81) | 🌀 Remolino Agua (82) | 🕳️ Torbellino Arena (83)<br>
        <b>BLOQUES:</b> 21 Piedra Sólida | 32 Baldosa | 40 Suelo Cueva | 50 Agua (Entra por Orilla 60) | 70 Entrar | 71 Salir
    </div>

</body>
<script src="mapas.js"></script>
<script src="script.js"></script>
</html>
