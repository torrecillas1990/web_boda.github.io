<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dots Memories Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fcfcfc; --text: #1a1a1a; --accent: #000; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 40px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; border: 1px solid #eee; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #ddd; }
        button { background: var(--accent); color: white; font-weight: bold; cursor: pointer; border: none; }
        #status { margin-top: 15px; font-size: 0.8rem; color: #666; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>Subir Memoria</h1>
    <p>Se guardará en: <code>imagenes/{autor}/foto.jpg</code></p>
    
    <input type="text" id="author" placeholder="Nombre del autor (Obligatorio)" required>
    <input type="file" id="file" accept="image/*">
    <button onclick="uploadToGithub()" id="btn">Publicar en GitHub</button>
    
    <div id="status"></div>
</div>

<script>
    // --- CONFIGURACIÓN CRÍTICA ---
    const GITHUB_TOKEN = 'TU_TOKEN_AQUÍ'; // No compartas esto
    const REPO_OWNER = 'TU_USUARIO_GITHUB';
    const REPO_NAME = 'NOMBRE_DE_TU_REPO';
    // ------------------------------

    const authorInput = document.getElementById('author');
    const status = document.getElementById('status');

    // Recuperar autor de la sesión anterior
    window.onload = () => {
        authorInput.value = localStorage.getItem('memories_author') || '';
    };

    async function uploadToGithub() {
        const author = authorInput.value.trim();
        const fileInput = document.getElementById('file');
        const file = fileInput.files[0];

        if (!author || !file) return alert("Rellena todos los campos");

        // Guardar autor localmente
        localStorage.setItem('memories_author', author);
        
        const btn = document.getElementById('btn');
        btn.disabled = true;
        status.innerText = "Procesando imagen...";

        const reader = new FileReader();
        reader.onload = async function(e) {
            const content = e.target.result.split(',')[1]; // Solo el base64
            const folderAuthor = author.toLowerCase().replace(/\s/g, '-');
            const path = `imagenes/${folderAuthor}/${Date.now()}-${file.name}`;

            status.innerText = "Subiendo a GitHub...";

            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: `Añadida foto de ${author}`,
                        content: content
                    })
                });

                if (response.ok) {
                    status.innerHTML = "✅ ¡Guardado! La web se actualizará en unos minutos.";
                    fileInput.value = '';
                } else {
                    const error = await response.json();
                    status.innerText = "❌ Error: " + error.message;
                }
            } catch (err) {
                status.innerText = "❌ Error de conexión.";
            } finally {
                btn.disabled = false;
            }
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
