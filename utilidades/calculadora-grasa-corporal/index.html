<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Grasa Corporal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Calculadora de Grasa %</h1>
        <form id="fat-form">
            <div class="input-group">
                <label>Género</label>
                <select id="gender">
                    <option value="male">Hombre</option>
                    <option value="female">Mujer</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>Altura (cm)</label>
                <input type="number" id="height" placeholder="Ej: 175" required>
            </div>

            <div class="input-group">
                <label>Cuello (cm)</label>
                <input type="number" id="neck" placeholder="Ej: 38" required>
            </div>

            <div class="input-group">
                <label>Cintura (cm)</label>
                <input type="number" id="waist" placeholder="Ej: 85" required>
            </div>

            <div id="hip-container" class="input-group hidden">
                <label>Cadera (cm)</label>
                <input type="number" id="hip" placeholder="Ej: 95">
            </div>

            <button type="button" onclick="calculateFat()">Calcular</button>
        </form>

        <div id="result-container" class="hidden">
            <h3>Tu porcentaje de grasa es:</h3>
            <p id="fat-percentage">0%</p>
            <p id="fat-category"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
